name: Docs Check

on:
  pull_request:
    branches: [main]

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check docs accompany code changes
        run: |
          # Get changed files in this PR
          CHANGED=$(git diff --name-only origin/main...HEAD)
          
          # Flags
          HAS_GO_CHANGES=false
          HAS_DOC_CHANGES=false
          HAS_TEST_CHANGES=false
          NEEDS_DOCS=false
          
          for file in $CHANGED; do
            # Go source changes (not tests)
            if [[ "$file" == *.go && "$file" != *_test.go ]]; then
              HAS_GO_CHANGES=true
            fi
            
            # Test changes
            if [[ "$file" == *_test.go ]]; then
              HAS_TEST_CHANGES=true
            fi
            
            # Doc changes
            if [[ "$file" == *.md ]]; then
              HAS_DOC_CHANGES=true
            fi
            
            # These files ALWAYS need doc updates
            if [[ "$file" == "main.go" || 
                  "$file" == internal/server/server.go ||
                  "$file" == internal/auth/auth.go ||
                  "$file" == internal/hooks/hooks.go ||
                  "$file" == internal/panels/registry.go ]]; then
              NEEDS_DOCS=true
            fi
          done
          
          echo "Go changes: $HAS_GO_CHANGES"
          echo "Doc changes: $HAS_DOC_CHANGES"
          echo "Test changes: $HAS_TEST_CHANGES"
          echo "Needs docs: $NEEDS_DOCS"
          
          # Rule 1: Core Go changes without any docs = warning
          if [[ "$NEEDS_DOCS" == "true" && "$HAS_DOC_CHANGES" == "false" ]]; then
            echo ""
            echo "⚠️  DOCS CHECK: Core files changed without documentation updates."
            echo ""
            echo "Changed core files:"
            for file in $CHANGED; do
              if [[ "$file" == main.go || 
                    "$file" == internal/server/server.go ||
                    "$file" == internal/auth/auth.go ||
                    "$file" == internal/hooks/hooks.go ||
                    "$file" == internal/panels/registry.go ]]; then
                echo "  - $file"
              fi
            done
            echo ""
            echo "Please update the relevant docs:"
            echo "  - New endpoint/feature → README.md or AGENT-EXTEND.md"
            echo "  - Contract change → CONTRACTS.md"
            echo "  - Architecture change → ARCHITECTURE.md"
            echo "  - Testing change → TESTING.md"
            echo "  - Breaking change → BREAKING_CHANGES.md"
            echo ""
            echo "If this is an internal refactor with no user-facing changes,"
            echo "add '[no-docs]' to your commit message to skip this check."
            echo ""
            
            # Check for [no-docs] escape hatch
            COMMITS=$(git log --format="%s" origin/main...HEAD)
            if echo "$COMMITS" | grep -q '\[no-docs\]'; then
              echo "✅ [no-docs] found in commit message — skipping."
              exit 0
            fi
            
            exit 1
          fi
          
          # Rule 2: Go changes should have tests
          if [[ "$HAS_GO_CHANGES" == "true" && "$HAS_TEST_CHANGES" == "false" ]]; then
            echo ""
            echo "💡 NOTE: Go source files changed but no test files updated."
            echo "   Consider adding tests for new behavior."
            echo "   (This is a suggestion, not a blocker.)"
            echo ""
          fi
          
          echo ""
          echo "✅ Docs check passed."
